<div class="account-page">

    @let p = profile();

    @if (loading()) {
        <div class="account-page__spinner">
            <mat-spinner diameter="48"/>
        </div>
    } @else if (error()) {
        <div class="account-page__error" i18n>
            Utilisateur introuvable.
        </div>
    } @else if (p) {

        <mat-card class="account-page__profile">
            <mat-card-content>
                <div class="profile__identity">
                    @if (getAvatarUrl(p.avatar); as avatarUrl) {
                        <img class="profile__avatar" [src]="avatarUrl" [alt]="p.userName" width="90" height="30"/>
                    }
                    <span class="profile__username">{{ p.userName }}</span>
                </div>
            </mat-card-content>
        </mat-card>

        <mat-card class="account-page__towns">
            <mho-town-list [playerId]="userId()"/>
        </mat-card>
    }

</div>
