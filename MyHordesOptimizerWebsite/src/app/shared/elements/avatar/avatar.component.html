@if (src() && src() !== '' && src() !== 'False') {
    <picture class="mho-avatar" [class.rounded]="rounded()">
        <source [srcset]="MYHORDES_URL + src()" type="image/avif"/>
        <source [srcset]="MYHORDES_URL + src()" type="image/webp"/>
        <img [src]="MYHORDES_URL + src()">
    </picture>
}
