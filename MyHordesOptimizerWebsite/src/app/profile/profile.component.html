@let p = profile();

<mat-card-header class="mho-profile__header">
    <mat-card-title class="mho-profile__title">
        @if (p) {
            @if (getAvatarUrl(p.avatar); as avatarUrl) {
                <img class="mho-profile__avatar" [src]="avatarUrl" [alt]="p.userName" width="90" height="30"/>
            }
            {{ p.userName }}
        } @else {
            <ng-container i18n>Compte</ng-container>
        }
    </mat-card-title>

    @if (p) {
        <button class="mho-profile__import" mat-stroked-button type="button"
                (click)="triggerImport()" [disabled]="importing()">
            @if (importing()) {
                <mat-spinner diameter="18"/>
            } @else {
                <span class="mho-profile__import-label">
                    <mat-icon>refresh</mat-icon>
                    @if (importedAt(); as importedAt) {
                        <ng-container i18n>À jour au {{ importedAt | date:'short' }}</ng-container>
                    } @else {
                        <ng-container i18n>Importer mes données</ng-container>
                    }
                </span>
            }
        </button>
    }
</mat-card-header>
<mat-card-content class="mho-profile">
    @if (loading()) {
        <div class="mho-profile__spinner">
            <mat-spinner diameter="48"/>
        </div>
    } @else if (error()) {
        <div class="mho-profile__error" i18n>Utilisateur introuvable.</div>
    } @else if (p) {
        <nav mat-tab-nav-bar [mat-stretch-tabs]="false" mat-align-tabs="start" [tabPanel]="panel">
            @for (link of links; track link.link) {
                <a mat-tab-link [routerLink]="[link.link]" routerLinkActive #rla="routerLinkActive" [active]="rla.isActive">
                    {{ link.label }}
                </a>
            }
        </nav>

        <mat-tab-nav-panel #panel>
            <router-outlet></router-outlet>
        </mat-tab-nav-panel>
    }
</mat-card-content>
