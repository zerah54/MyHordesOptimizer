<h1 mat-dialog-title i18n>Pictos de {{ data.citizenName }} dans cette ville</h1>
<div mat-dialog-content class="citizen-pictos">
    @if (loading()) {
        <div class="citizen-pictos__spinner">
            <mat-spinner diameter="32"/>
        </div>
    } @else if (error()) {
        <div class="citizen-pictos__error" i18n>Impossible de récupérer les pictos.</div>
    } @else {
        <mho-pictos-list [pictos]="pictos()" [showTotal]="true"/>
    }
</div>
<div mat-dialog-actions>
    <button mat-button type="button" [mat-dialog-close]="true" cdkFocusInitial i18n>Fermer</button>
</div>
